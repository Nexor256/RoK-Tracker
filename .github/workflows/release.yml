name: Build & Release (Tauri + Nuitka)

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    env:
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

    steps:
      # ── Checkout ──────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Python (for Nuitka sidecar) ───────────────────────────
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          architecture: "x64"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip wheel setuptools
          python -m pip install -r requirements_win64.txt
          python -m pip install nuitka

      # ── Bundle Python sidecar with Nuitka ─────────────────────
      - name: Build Nuitka sidecar
        run: python scripts/bundle_sidecar.py

      # ── Node.js + pnpm (for Vue frontend) ─────────────────────
      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest
          run_install: false

      - name: Install frontend dependencies
        working-directory: gui_frontend
        run: pnpm install

      # ── Rust (for Tauri) ──────────────────────────────────────
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      # ── Build Tauri installer ─────────────────────────────────
      - name: Build Tauri app
        working-directory: gui_frontend
        run: npx tauri build

      - name: Summarize build
        shell: bash
        run: |
          echo "### ✅ Build complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Tag | \`${GITHUB_REF_NAME}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Python | 3.12 (x64) |" >> $GITHUB_STEP_SUMMARY
          echo "| Node | 22 |" >> $GITHUB_STEP_SUMMARY
          echo "| Rust | stable |" >> $GITHUB_STEP_SUMMARY

      # ── Upload artifacts ──────────────────────────────────────
      - name: Upload NSIS installer
        uses: actions/upload-artifact@v4
        with:
          name: nsis-installer
          path: src-tauri/target/release/bundle/nsis/*.exe

      - name: Upload NSIS signature
        uses: actions/upload-artifact@v4
        with:
          name: nsis-sig
          path: src-tauri/target/release/bundle/nsis/*.sig

      - name: Upload MSI installer
        uses: actions/upload-artifact@v4
        with:
          name: msi-installer
          path: src-tauri/target/release/bundle/msi/*.msi

      - name: Upload MSI signature
        uses: actions/upload-artifact@v4
        with:
          name: msi-sig
          path: src-tauri/target/release/bundle/msi/*.sig

  # ── Create GitHub Release with latest.json ──────────────────
  release:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download NSIS installer
        uses: actions/download-artifact@v4
        with:
          name: nsis-installer
          path: installers/

      - name: Download NSIS signature
        uses: actions/download-artifact@v4
        with:
          name: nsis-sig
          path: installers/

      - name: Download MSI installer
        uses: actions/download-artifact@v4
        with:
          name: msi-installer
          path: installers/

      - name: Download MSI signature
        uses: actions/download-artifact@v4
        with:
          name: msi-sig
          path: installers/

      - name: Generate latest.json for updater
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"

          # Find the NSIS exe and read its signature
          NSIS_EXE=$(ls installers/*.exe 2>/dev/null | head -1)
          NSIS_SIG_FILE=$(ls installers/*.exe.sig 2>/dev/null | head -1)

          if [ -z "$NSIS_EXE" ] || [ -z "$NSIS_SIG_FILE" ]; then
            echo "ERROR: Could not find NSIS installer or signature"
            exit 1
          fi

          NSIS_FILENAME=$(basename "$NSIS_EXE")
          NSIS_SIG=$(cat "$NSIS_SIG_FILE")

          cat > installers/latest.json << EOF
          {
            "version": "${VERSION}",
            "notes": "RoK Tracker Suite ${TAG} — see release notes on GitHub for details.",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "platforms": {
              "windows-x86_64": {
                "signature": "${NSIS_SIG}",
                "url": "https://github.com/AbdUlrahman097/RoK-Tracker/releases/download/${TAG}/${NSIS_FILENAME}"
              }
            }
          }
          EOF

          echo "### 📦 latest.json generated" >> $GITHUB_STEP_SUMMARY
          echo '```json' >> $GITHUB_STEP_SUMMARY
          cat installers/latest.json >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: RoK Tracker Suite ${{ github.ref_name }}
          generate_release_notes: true
          files: installers/*
