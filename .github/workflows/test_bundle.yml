name: Test Build (Tauri + Nuitka)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      # ── Checkout ──────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Python (for Nuitka sidecar) ───────────────────────────
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          architecture: "x64"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip wheel setuptools
          python -m pip install -r requirements_win64.txt
          python -m pip install nuitka

      # ── Bundle Python sidecar with Nuitka ─────────────────────
      - name: Build Nuitka sidecar
        run: python scripts/bundle_sidecar.py

      # ── Node.js + pnpm (for Vue frontend) ─────────────────────
      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest
          run_install: false

      - name: Install frontend dependencies
        working-directory: gui_frontend
        run: pnpm install

      # ── Rust (for Tauri) ──────────────────────────────────────
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      # ── Build Tauri installer ─────────────────────────────────
      - name: Build Tauri app
        run: npx --prefix gui_frontend tauri build

      - name: Summarize build
        shell: bash
        run: |
          echo "### ✅ Test build complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Python | 3.12 (x64) |" >> $GITHUB_STEP_SUMMARY
          echo "| Node | 22 |" >> $GITHUB_STEP_SUMMARY
          echo "| Rust | stable |" >> $GITHUB_STEP_SUMMARY

      # ── Upload artifacts for manual testing ───────────────────
      - name: Upload NSIS installer
        uses: actions/upload-artifact@v4
        with:
          name: nsis-installer
          path: src-tauri/target/release/bundle/nsis/*.exe

      - name: Upload MSI installer
        uses: actions/upload-artifact@v4
        with:
          name: msi-installer
          path: src-tauri/target/release/bundle/msi/*.msi