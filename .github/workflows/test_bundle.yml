name: Test Build (Tauri + Nuitka)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      # ── Checkout ──────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python 3.14
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          architecture: "x64"

      - name: Install Python dependencies
        run: uv sync --frozen

      # ── Bundle Python sidecar with Nuitka ─────────────────────
      - name: Build Nuitka sidecar
        run: uv run scripts/bundle_sidecar.py

      # ── Node.js + pnpm (for Vue frontend) ─────────────────────
      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest
          run_install: false

      - name: Install frontend dependencies
        working-directory: gui_frontend
        run: pnpm install

      # ── Rust (for Tauri) ──────────────────────────────────────
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      # ── Build Tauri installer ─────────────────────────────────
      - name: Build Tauri app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: ./gui_frontend/node_modules/.bin/tauri build

      - name: Summarize build
        shell: bash
        run: |
          echo "### ✅ Test build complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Python | 3.13 (x64) |" >> $GITHUB_STEP_SUMMARY
          echo "| Node | 22 |" >> $GITHUB_STEP_SUMMARY
          echo "| Rust | stable |" >> $GITHUB_STEP_SUMMARY

      # ── Upload artifacts for manual testing ───────────────────
      - name: Upload NSIS installer
        uses: actions/upload-artifact@v4
        with:
          name: nsis-installer
          path: src-tauri/target/release/bundle/nsis/*.exe
